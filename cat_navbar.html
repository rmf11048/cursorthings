<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT Navbar Redesign</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #13131f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .label {
    color: #666688;
    font-size: 12px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── NAVBAR ── */
  .navbar {
    background: #1e1e2e;
    border-bottom: 1px solid #2a2a3a;
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 0;
    position: relative;
    border-radius: 8px;
  }

  /* Tool icon + dropdown trigger */
  .tool-icon-wrapper { position: relative; display: flex; align-items: center; }
  .tool-icon-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    padding: 6px 8px 6px 6px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .tool-icon-btn:hover { background: rgba(255,255,255,0.08); }
  .cat-icon {
    width: 28px; height: 28px; border-radius: 5px;
    flex-shrink: 0;
  }
  .caret {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #777;
    margin-top: 1px;
  }

  /* Divider */
  .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 10px; }

  /* Pipeline selector */
  .pipeline-wrapper { position: relative; display: flex; align-items: center; gap: 8px; }
  .pipeline-label { color: #6a6a88; font-size: 12px; white-space: nowrap; }
  .pipeline-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 10px;
    color: #dde0f5; font-size: 13px;
    transition: background 0.15s;
    white-space: nowrap;
    width: 110px;
  }
  .pipeline-btn:hover { background: rgba(255,255,255,0.09); }
  .pip-dot { width: 8px; height: 8px; border-radius: 50%; background: #7c6af7; }
  .pip-caret {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid #666;
  }

  /* Nav links */
  .nav-links { display: flex; align-items: stretch; margin-left: 12px; height: 52px; }
  .nav-link {
    display: flex; align-items: center;
    color: #8888aa; font-size: 13.5px;
    text-decoration: none; cursor: pointer;
    padding: 0 14px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .nav-link:hover { color: #dde0f5; background: rgba(255,255,255,0.04); }
  .nav-link.active { color: #8b7cf8; border-bottom-color: #8b7cf8; background: rgba(139,124,248,0.07); }

  /* Right side */
  .spacer { flex: 1; }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .ao-btn {
    background: rgba(107,89,235,0.18);
    border: 1px solid rgba(107,89,235,0.4);
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    color: #c4baff; font-size: 13px;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .ao-btn:hover { background: rgba(107,89,235,0.28); }
  .ao-warn { width: 7px; height: 7px; border-radius: 50%; background: #fb923c; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 6px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #8888aa; font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.07); color: #dde0f5; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    background: linear-gradient(135deg, #7c6af7, #4a8fe8);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 600;
  }

  /* Dropdown menus */
  .dropdown {
    position: absolute; top: calc(100% + 8px); left: 0;
    background: #242436; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; min-width: 200px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.55);
    z-index: 100; display: none; overflow: hidden;
  }
  .dropdown.open { display: block; }
  .dd-header {
    font-size: 10px; font-weight: 600; color: #55556a;
    text-transform: uppercase; letter-spacing: 0.09em;
    padding: 10px 14px 5px;
  }
  .dd-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 14px; color: #b8b8d0; font-size: 13.5px; cursor: pointer;
    transition: background 0.12s;
  }
  .dd-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .dd-icon { opacity: 0.55; flex-shrink: 0; }
  .dd-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }
  .dd-check { margin-left: auto; color: #7c6af7; font-size: 13px; }
  .pip-swatch { width: 8px; height: 8px; border-radius: 50%; }

  /* Demo note */
  .note {
    margin-top: 24px; color: #444460; font-size: 12px; text-align: center;
  }
  .note span { color: #7c6af7; }
</style>
</head>
<body>

<p class="label">Redesigned top navigation</p>

<nav class="navbar" id="navbar">

    </button>
    <div class="dropdown" id="tool-dd">
      <div class="dd-item">Maintenance</div>
    </div>
  </div>

  <!-- Divider -->
  <div class="sep"></div>

  <!-- 3. Pipeline dropdown -->
  <div class="pipeline-wrapper">
    <button class="pipeline-btn" onclick="toggleDD('pip-dd')">
      <span id="pip-label">HR</span>
      <div class="pip-caret"></div>
    </button>
    <div class="dropdown" id="pip-dd" style="min-width:180px">
      <div class="dd-item" onclick="setPipeline(this,'Finance','chk-finance')">
        Finance
        <span class="dd-check" id="chk-finance" style="display:none">✓</span>
      </div>
      <div class="dd-item" onclick="setPipeline(this,'HR','chk-hr')">
        HR
        <span class="dd-check" id="chk-hr">✓</span>
      </div>
    </div>
  </div>

  <!-- 4. Nav links right after pipeline -->
  <div class="nav-links">
    <a class="nav-link active" onclick="setActive(this)">Conversion plans</a>
    <a class="nav-link" onclick="setActive(this)">ODC blueprint</a>
    <a class="nav-link" onclick="setActive(this)">Assessment</a>
  </div>

  <div class="spacer"></div>

  <!-- 5. Right side: Assessment Overview, Help, Avatar -->
  <div class="nav-right">
    <button class="ao-btn">
      Assessment Overview
      <div class="ao-warn"></div>
    </button>
    <button class="icon-btn" title="Help" style="font-size:15px; font-weight:600; border: 1px solid rgba(255,255,255,0.1); border-radius:50%; width:28px; height:28px;">?</button>
    <div class="avatar" title="Logged in user: RM">RM</div>
  </div>

</nav>

<p class="note">Click the <span>CAT icon</span> to see the Maintenance dropdown · Click <span>HR</span> to switch between Finance and HR</p>

<script>
  function toggleDD(id) {
    document.querySelectorAll('.dropdown').forEach(d => {
      if (d.id !== id) d.classList.remove('open');
    });
    document.getElementById(id).classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.tool-icon-wrapper') && !e.target.closest('.pipeline-wrapper')) {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    }
  });

  function setPipeline(el, name, checkId) {
    document.getElementById('pip-label').textContent = name;
    ['chk-finance','chk-hr'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    document.getElementById(checkId).style.display = 'inline';
    document.getElementById('pip-dd').classList.remove('open');
  }

  function setActive(el) {
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
