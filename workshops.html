// ─── WORKSHOP 1 ────────────────────────────────────────────────────────────────
const W1 = { id:1, day:"Monday", title:"AX Design & Frameworks", color:"#1740a8", accent:"#e8edf8", accentDark:"#0A0D14", time:"09:00 – 13:00", audience:"5–8 people", coreQuestion:"What is AX, what do we have, and how do we practice it?", why:"Before the team can work in AX, they need a shared mental model. This session walks through the UX→UAX→AX evolution, audits existing assets, and locks in how the team will use the frameworks going forward. It's the foundational session — everything else in the week builds on the shared language established here.", goalStatement:"By 13:00, the team has a shared vocabulary, knows what assets exist, and has agreed on which models and artifacts to use going forward." };

// ─── WORKSHOP 2 ────────────────────────────────────────────────────────────────
const W2 = { id:2, day:"Tuesday", title:"Human-Agent Interaction", color:"#7c3aed", accent:"#f0ebfa", accentDark:"#0f0a1a", time:"09:00 – 13:00", audience:"5–8 people", coreQuestion:"How many loops are there, and what should we settle on?", why:"The HITL/HATL/HOTL taxonomy is central to how the team designs agent experiences, but there are 8 patterns and multiple overlapping models in the wild. This session stress-tests the model as a group, forces real decisions about which patterns matter, and locks in a shared version the team can reference going forward. The second half pivots to research: how do we prove our model works?", goalStatement:"By 13:00, the team has a locked loop model with agreed definitions, has stress-tested it against real scenarios, and has 2–3 research questions with study designs ready to run." };

];

  { name:"HITL Dual Loop Model v5", desc:"Animated SVG — UX loop + AX loop + shared intent center + HITL bridge", url:null, status:"built", note:"Standalone HTML, light version. Used as visual anchor during the taxonomy walkthrough." },

  { name:"External References", desc:"NN/g on HITL patterns, Jenny Wen's AX writing, academic papers", url:null, status:"to-create", note:"Curate a short reading list — 3–5 key external sources that validate or challenge the model." },
];
const W2_PREP = [
  { task:"Select canonical version of the 8-pattern taxonomy (from existing formats)", critical:true },
  { task:"Create Trust Mode Spec as a fillable template", critical:true },
  { task:"Prepare 2–3 real OutSystems product scenarios for the stress test", critical:true },
  { task:"Curate external references (NN/g, Jenny Wen, academic papers)", critical:false },
  { task:"Print/share the industry × pattern matrix as a reference", critical:false },

  { time:"09:00", dur:"15 min", label:"Opening & Setup Check", detail:"Verify everyone's tools are installed and working: Claude account, Cursor (if applicable), Git basics. Troubleshoot now — not during the exercises. Quick show of hands: who's used AI tools for design work this week?", type:"align" },

const W3_FACILITATION = "This workshop has the most prep of all four. The setup guides must work flawlessly — nothing kills momentum faster than 30 minutes of debugging installs. Have everyone pre-install tools on Tuesday. The 75-minute hands-on block is the core of the session: real work, not demos. Circulate and take notes on what people struggle with — those struggles become the patterns. The share-out is where the magic happens: real stories from 30 minutes ago, not hypotheticals.";

// ─── WORKSHOP 4 ────────────────────────────────────────────────────────────────

const W4_OUTPUTS = [

const W4_AGENDA = [
  { time:"09:00", dur:"15 min", label:"Opening & Week Recap", detail:"Brief recap of Monday–Wednesday: the vocabulary (W1), the model (W2), the tools (W3). Frame today: 'We know what AX is, how humans and agents interact, and how to work with AI. Now: how do we prove our work is good, and how do we sell that to leadership?'", type:"align" },
  { time:"09:15", dur:"30 min", label:"The Delightful Score V2", detail:"Introduce the framework: 35 elements across 5 dimensions (App Performance, Easy Entry, Ease of Use, User Interface, Native Feel). Walk through the scoring model. Explain how each element maps to an NN/g heuristic. This is the team's shared quality language.", type:"teach" },
  { time:"09:45", dur:"30 min", label:"Calibration Exercise", detail:"Everyone scores the same app independently using the Delightful Score. Compare results. Where do people diverge? The divergences are the conversation — they reveal where the team's quality intuition differs. Align on scoring norms.", type:"exercise" },
  { time:"10:15", dur:"15 min", label:"Break", detail:"", type:"break" },
  { time:"10:30", dur:"45 min", label:"Live Bakeoff", detail:"Run the competitive bakeoff: 3–4 competitor apps scored side-by-side using the UX Bakeoff tool. Split into pairs — each pair takes one competitor. Regroup and compare. Where is OutSystems ahead? Where is it embarrassingly behind?", type:"exercise" },

];

  { name:"Delightful Score V2 Framework", desc:"35 elements across 5 dimensions — the scoring backbone", url:null, status:"live", note:"System prompt exists and is tested. Each element maps to an NN/g heuristic." },

  { name:"UX Bakeoff Tool", desc:"Competitive analysis — multiple apps scored and compared side-by-side", url:null, status:"live", note:"React artifact with radar charts, score cards, and comparative recommendations." },

];

  { task:"Create quality gates template (table format)", critical:true },

];

// ─── SHARED ────────────────────────────────────────────────────────────────────
const STATUS_STYLES = {
  live:      { label:"Live",      bg:"#dcfce7", fg:"#166534" },

const TABS = ["plan","agenda","assets","prep"];

function typeColors(wColor) {
  return {
    teach:    { bg: wColor + "22", fg: wColor, label:"Teach" },
    exercise: { bg:"#dcfce7", fg:"#166534", label:"Hands-on" },
    decide:   { bg:"#fef9c3", fg:"#854d0e", label:"Decision" },
    align:    { bg:"#f3e8ff", fg:"#6b21a8", label:"Align" },
    break:    { bg:"#f5f5f4", fg:"#9090aa", label:"Break" },
  };
}

function Workshop({ W, outputs, agenda, assets, prep, facilitation }) {
  const [tab, setTab] = useState("plan");
  const [checked, setChecked] = useState({});
  const toggle = (i) => setChecked(p => ({ ...p, [i]: !p[i] }));
  const doneCount = Object.values(checked).filter(Boolean).length;
  const TC = typeColors(W.color);

  return (
    <div style={{ minHeight:"100vh", background:"#f4f1eb", fontFamily:"'DM Sans', system-ui, sans-serif", color:"#1a1a2e" }}>
      {/* Hero */}
      <div style={{ background: W.accentDark, color:"#f4f1eb", padding:"48px 32px 0" }}>
        <div style={{ maxWidth:720, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <div style={{ width:40, height:40, borderRadius:10, background:W.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:700, color:"#fff" }}>{W.id}</div>

          </div>
          <h1 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:40, fontWeight:600, margin:"0 0 10px", lineHeight:1.15 }}>{W.title}</h1>
          <p style={{ fontSize:15, opacity:0.5, lineHeight:1.6, maxWidth:540, marginBottom:28 }}>{W.coreQuestion}</p>
          <div style={{ display:"flex", gap:4 }}>
            {TABS.map(t => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding:"8px 20px", fontSize:13, fontWeight:500, fontFamily:"inherit",
                border:"none", borderRadius:"6px 6px 0 0", cursor:"pointer",
                background: tab===t ? "#f4f1eb" : "rgba(255,255,255,0.06)",
                color: tab===t ? "#1a1a2e" : "rgba(255,255,255,0.35)", transition:"all 0.2s",
              }}>
                {t==="plan"?"Overview":t==="agenda"?"Agenda":t==="assets"?"Assets":"Prep"}
                {t==="prep" && <span style={{ marginLeft:6, fontSize:10, opacity:0.6 }}>{doneCount}/{prep.length}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:720, margin:"0 auto", padding:"28px 32px 60px" }}>

        {/* PLAN */}
        {tab==="plan" && (
          <div>
            <div style={{ background:W.accent, borderRadius:10, padding:"18px 22px", borderLeft:`3px solid ${W.color}`, marginBottom:24 }}>
              <div style={{ fontSize:11, fontWeight:600, color:W.color, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>Session Goal</div>
              <div style={{ fontSize:15, fontWeight:500, lineHeight:1.5 }}>{W.goalStatement}</div>
            </div>
            <p style={{ fontSize:14, lineHeight:1.7, color:"#4a4a6a", marginBottom:28 }}>{W.why}</p>

            <h3 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:22, fontWeight:600, marginBottom:14 }}>What the team walks out with</h3>
            <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:32 }}>
              {outputs.map((o,i) => (
                <div key={i} style={{ display:"flex", gap:12, alignItems:"flex-start", padding:"14px 18px", background:"#fff", borderRadius:8, border:"1px solid rgba(0,0,0,0.06)" }}>
                  <span style={{ color:W.color, fontSize:16, marginTop:1 }}>{OUTPUT_ICONS[o.type] || "◆"}</span>
                  <div>
                    <div style={{ fontSize:14, fontWeight:500, lineHeight:1.5 }}>{o.text}</div>
                    <div style={{ fontSize:11, color:"#9090aa", marginTop:2, textTransform:"uppercase", letterSpacing:"0.06em" }}>{o.type}</div>
                  </div>
                </div>
              ))}
            </div>

            <h3 style={{ fontFamily:"'Cormorant Garamond', serif", fontSize:22, fontWeight:600, marginBottom:14 }}>At a glance</h3>
            <div style={{ background:"#fff", borderRadius:10, padding:"16px 20px", border:"1px solid rgba(0,0,0,0.06)" }}>
              {agenda.map((a,i) => (
                <div key={i} style={{ display:"flex", gap:12, alignItems:"center", padding:"8px 0", borderBottom: i<agenda.length-1?"1px solid rgba(0,0,0,0.04)":"none", opacity: a.type==="break"?0.5:1 }}>
                  <span style={{ fontSize:12, color:"#9090aa", width:44, flexShrink:0, fontVariantNumeric:"tabular-nums" }}>{a.time}</span>
                  <span style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:4, background:TC[a.type].bg, color:TC[a.type].fg, textTransform:"uppercase", letterSpacing:"0.04em", flexShrink:0 }}>{TC[a.type].label}</span>
                  <span style={{ fontSize:13, fontWeight:500 }}>{a.label}</span>
                  <span style={{ fontSize:11, color:"#9090aa", marginLeft:"auto", flexShrink:0 }}>{a.dur}</span>
                </div>
              ))}
            </div>

            <div style={{ marginTop:28, padding:"16px 20px", background:"#fefdfb", borderRadius:10, border:"1px dashed rgba(0,0,0,0.1)" }}>
              <div style={{ fontSize:11, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:"#9090aa", marginBottom:6 }}>Facilitation Notes</div>
              <p style={{ fontSize:13, lineHeight:1.6, color:"#4a4a6a", margin:0 }}>{facilitation}</p>
            </div>
          </div>
        )}

        {/* AGENDA */}
        {tab==="agenda" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {agenda.map((a,i) => (
              <div key={i} style={{
                background: a.type==="break"?"#f8f7f5":"#fff", borderRadius:10,
                padding: a.type==="break"?"12px 20px":"18px 22px",
                border:"1px solid rgba(0,0,0,0.06)",
                borderLeft: a.type!=="break"?`3px solid ${TC[a.type].fg}`:"1px solid rgba(0,0,0,0.06)",
              }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom: a.detail?8:0 }}>
                  <span style={{ fontSize:13, fontWeight:600, fontVariantNumeric:"tabular-nums" }}>{a.time}</span>
                  <span style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:4, background:TC[a.type].bg, color:TC[a.type].fg, textTransform:"uppercase", letterSpacing:"0.04em" }}>{TC[a.type].label}</span>
                  <span style={{ fontSize:15, fontWeight:600 }}>{a.label}</span>
                  <span style={{ fontSize:12, color:"#9090aa", marginLeft:"auto" }}>{a.dur}</span>
                </div>
                {a.detail && <p style={{ fontSize:13, lineHeight:1.6, color:"#4a4a6a", margin:0 }}>{a.detail}</p>}
              </div>
            ))}
          </div>
        )}

        {/* ASSETS */}
        {tab==="assets" && (
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <p style={{ fontSize:14, color:"#4a4a6a", lineHeight:1.6, marginBottom:8 }}>Everything needed for this session. Status indicates readiness.</p>
            {assets.map((a,i) => {
              const s = STATUS_STYLES[a.status];
              return (
                <div key={i} style={{ background:"#fff", borderRadius:10, padding:"18px 22px", border:"1px solid rgba(0,0,0,0.06)" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                    <span style={{ fontSize:10, fontWeight:600, padding:"2px 10px", borderRadius:4, background:s.bg, color:s.fg, textTransform:"uppercase", letterSpacing:"0.04em" }}>{s.label}</span>
                    <h4 style={{ fontSize:15, fontWeight:600, margin:0 }}>
                      {a.url ? <a href={a.url} target="_blank" rel="noopener noreferrer" style={{ color:W.color, textDecoration:"none", borderBottom:`1px solid ${W.color}40` }}>{a.name}</a> : a.name}
                    </h4>
                  </div>
                  <p style={{ fontSize:13, color:"#4a4a6a", margin:"0 0 4px", lineHeight:1.5 }}>{a.desc}</p>
                  {a.note && <p style={{ fontSize:12, color:"#9090aa", margin:0, fontStyle:"italic", lineHeight:1.5 }}>{a.note}</p>}
                </div>
              );
            })}
          </div>
        )}

        {/* PREP */}
        {tab==="prep" && (
          <div>
            <div style={{ background:"#fff", borderRadius:10, padding:"18px 22px", marginBottom:16, border:"1px solid rgba(0,0,0,0.06)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
                <span style={{ fontSize:14, fontWeight:600 }}>Prep Progress</span>
                <span style={{ fontSize:13, color:"#9090aa" }}>{doneCount} / {prep.length}</span>
              </div>
              <div style={{ height:8, background:"#e8e5df", borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:4, transition:"width 0.3s", width:`${(doneCount/prep.length)*100}%`, background: doneCount===prep.length?"#16a34a":W.color }} />
              </div>
            </div>
            <div style={{ background:"#fff", borderRadius:10, padding:"8px 22px", border:"1px solid rgba(0,0,0,0.06)" }}>
              {prep.map((p,i) => {
                const done = checked[i];
                return (
                  <label key={i} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"12px 0", cursor:"pointer", borderBottom: i<prep.length-1?"1px solid rgba(0,0,0,0.04)":"none" }}>
                    <input type="checkbox" checked={!!done} onChange={() => toggle(i)} style={{ marginTop:2, accentColor:W.color, width:16, height:16, cursor:"pointer" }} />
                    <div style={{ flex:1 }}>
                      <span style={{ fontSize:14, lineHeight:1.5, color: done?"#9090aa":"#1a1a2e", textDecoration: done?"line-through":"none" }}>{p.task}</span>
                      {p.critical && !done && <span style={{ marginLeft:8, fontSize:9, fontWeight:700, padding:"1px 6px", borderRadius:3, background:"#fee2e2", color:"#991b1b", textTransform:"uppercase", letterSpacing:"0.04em", verticalAlign:"middle" }}>Critical</span>}
                    </div>
                  </label>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP SHELL ─────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState(1);
  window.__setWorkshop = setActive;

  const workshops = {
    1: <Workshop W={W1} outputs={W1_OUTPUTS} agenda={W1_AGENDA} assets={W1_ASSETS} prep={W1_PREP} facilitation={W1_FACILITATION} />,
    2: <Workshop W={W2} outputs={W2_OUTPUTS} agenda={W2_AGENDA} assets={W2_ASSETS} prep={W2_PREP} facilitation={W2_FACILITATION} />,
    3: <Workshop W={W3} outputs={W3_OUTPUTS} agenda={W3_AGENDA} assets={W3_ASSETS} prep={W3_PREP} facilitation={W3_FACILITATION} />,
    4: <Workshop W={W4} outputs={W4_OUTPUTS} agenda={W4_AGENDA} assets={W4_ASSETS} prep={W4_PREP} facilitation={W4_FACILITATION} />,
  };

  return workshops[active];
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
function showWorkshop(n) {
  document.querySelectorAll("#nav button").forEach((b,i) => b.classList.toggle("active", i===n-1));
  if (window.__setWorkshop) window.__setWorkshop(n);
}
// Activate first on load
window.addEventListener("DOMContentLoaded", () => showWorkshop(1));
</script>
</body>
</html>
