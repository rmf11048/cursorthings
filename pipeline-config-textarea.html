<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up delivery pipelines</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      background: #f5f5f3;
      color: #1a1a18;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 3rem 1rem;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      max-width: 520px;
    }

    .card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 0.5px solid rgba(0,0,0,0.15);
    }

    .card-header p {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }

    .card-body {
      padding: 1.25rem 1.5rem;
    }

    .card-body > p {
      font-size: 14px;
      color: #5a5a57;
      margin-bottom: 1rem;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .radio-label:last-of-type {
      margin-bottom: 0;
    }

    .radio-label input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #1a1a18;
      cursor: pointer;
    }

    .radio-label span {
      font-size: 14px;
      color: #1a1a18;
    }

    #textarea-section {
      display: none;
      margin-top: 1.25rem;
    }

    textarea {
      width: 100%;
      font-size: 13px;
      font-family: inherit;
      color: #1a1a18;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      resize: vertical;
      min-height: 110px;
      line-height: 1.7;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    textarea:hover {
      border-color: rgba(0,0,0,0.4);
    }

    textarea:focus {
      border-color: #1a1a18;
      box-shadow: 0 0 0 2px rgba(26,26,24,0.08);
    }

    textarea.has-error {
      border-color: #b91c1c;
    }

    textarea::placeholder {
      color: #aaa;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .line-count {
      font-size: 12px;
      color: #aaa;
    }

    .error-msg {
      display: none;
      font-size: 12px;
      color: #b91c1c;
      margin-top: 5px;
    }

    .preview {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      background: #f5f5f3;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    .preview-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .preview-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .preview-chip {
      font-size: 12px;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      padding: 2px 10px;
      color: #1a1a18;
    }

    .card-footer {
      padding: 1rem 1.5rem;
      background: #f5f5f3;
      border-top: 0.5px solid rgba(0,0,0,0.15);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-cancel {
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 8px;
      background: none;
      color: #1a1a18;
      border: 0.5px solid rgba(0,0,0,0.3);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-cancel:hover {
      background: #e8e8e5;
    }

    .btn-save {
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 8px;
      background: #1a1a18;
      color: #ffffff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-save:hover {
      opacity: 0.85;
    }

    .success-msg {
      display: none;
      margin-top: 0.75rem;
      padding: 0.625rem 0.75rem;
      background: #f0fdf4;
      border-radius: 8px;
    }

    .success-msg p {
      font-size: 13px;
      color: #15803d;
    }
  </style>
</head>
<body>

  <div style="width: 100%; max-width: 520px;">
    <div class="card">
      <div class="card-header">
        <p>Set up delivery pipelines</p>
      </div>

      <div class="card-body">
        <p>Set up your delivery pipeline structure:</p>

        <label class="radio-label">
          <input type="radio" name="pipeline" value="single" checked>
          <span>Single pipeline</span>
        </label>

        <label class="radio-label">
          <input type="radio" name="pipeline" value="multiple">
          <span>Multiple pipeline</span>
        </label>

        <div id="textarea-section">
          <textarea
            id="pipeline-textarea"
            placeholder="pipeline-production&#10;pipeline-staging&#10;pipeline-dev"
            spellcheck="false"
          ></textarea>
          <div class="hint">
            <span>One pipeline name per line</span>
            <span class="line-count" id="line-count">0 pipelines</span>
          </div>
          <p class="error-msg" id="error-msg">Add at least 2 pipeline names to continue.</p>

          <div class="preview" id="preview">
            <p class="preview-label">Pipelines</p>
            <div class="preview-chips" id="preview-chips"></div>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <button class="btn-cancel" onclick="handleCancel()">Cancel</button>
        <button class="btn-save" onclick="handleSave()">Save</button>
      </div>
    </div>

    <div class="success-msg" id="success-msg">
      <p id="success-text"></p>
    </div>
  </div>

  <script>
    function getLines() {
      const raw = document.getElementById('pipeline-textarea').value;
      return raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    }

    function updatePreview() {
      const lines = getLines();
      const count = lines.length;
      const countEl = document.getElementById('line-count');
      countEl.textContent = count === 0 ? '0 pipelines' : count === 1 ? '1 pipeline' : count + ' pipelines';

      const preview = document.getElementById('preview');
      const chips = document.getElementById('preview-chips');

      if (count > 0) {
        preview.style.display = 'block';
        chips.innerHTML = '';
        lines.forEach(name => {
          const chip = document.createElement('span');
          chip.className = 'preview-chip';
          chip.textContent = name;
          chips.appendChild(chip);
        });
      } else {
        preview.style.display = 'none';
      }

      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('pipeline-textarea').classList.remove('has-error');
    }

    document.getElementById('pipeline-textarea').addEventListener('input', updatePreview);

    document.querySelectorAll('input[name="pipeline"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const isMultiple = radio.value === 'multiple';
        document.getElementById('textarea-section').style.display = isMultiple ? 'block' : 'none';
        if (isMultiple) setTimeout(() => document.getElementById('pipeline-textarea').focus(), 50);
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('pipeline-textarea').classList.remove('has-error');
        document.getElementById('success-msg').style.display = 'none';
      });
    });

    function handleSave() {
      const mode = document.querySelector('input[name="pipeline"]:checked').value;
      document.getElementById('success-msg').style.display = 'none';

      if (mode === 'multiple') {
        const lines = getLines();
        if (lines.length < 2) {
          document.getElementById('error-msg').style.display = 'block';
          document.getElementById('pipeline-textarea').classList.add('has-error');
          document.getElementById('pipeline-textarea').focus();
          return;
        }

        document.getElementById('success-text').textContent =
          'Configuration saved: Multiple pipelines — ' + lines.join(', ') + '.';
      } else {
        document.getElementById('success-text').textContent =
          'Configuration saved: Single pipeline.';
      }

      document.getElementById('success-msg').style.display = 'block';
    }

    function handleCancel() {
      document.querySelectorAll('input[name="pipeline"]')[0].checked = true;
      document.getElementById('pipeline-textarea').value = '';
      document.getElementById('textarea-section').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('pipeline-textarea').classList.remove('has-error');
      document.getElementById('preview').style.display = 'none';
      document.getElementById('line-count').textContent = '0 pipelines';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>

</body>
</html>
