    * {

    body {

    table {

      border: 1px solid #333;

      overflow: hidden;

    th, td {

    th {

      color: #b0b0b0;
      background: #2a2a2a;
    }
    th:first-child {
      width: 40%;
    }
    th:nth-child(n+2) {
      text-align: center;
      width: 20%;
    }
    td:first-child {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    td:nth-child(n+2) {
      text-align: center;
    }
    /* Make entire cell clickable for checkbox columns */
    td:has(.checkbox-wrap) {
      position: relative;
      cursor: pointer;
    }
    td:has(.checkbox-wrap) .checkbox-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .section {
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section:last-of-type {
      margin-bottom: 0;
    }
    .section table {
      border: none;
      border-radius: 0;
      margin: 0;
    }
    .section tr:first-child td,
    .section tr:first-child th {
      border-top: none;
    }
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #444;
      color: #888;
      font-size: 11px;
      font-weight: 600;
      cursor: help;
      flex-shrink: 0;
    }
    .info-icon:hover {
      background: #555;
      color: #aaa;
    }
    .checkbox-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .checkbox-wrap input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .checkbox-box {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid #555;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .checkbox-box svg {
      width: 12px;
      height: 12px;
      color: #fff;
    }
    .checkbox-wrap input:checked + .checkbox-box {
      background: #7c3aed;
      border-color: #7c3aed;
    }
    .checkbox-wrap:hover .checkbox-box {
      border-color: #666;
    }
    .checkbox-wrap input:checked:hover + .checkbox-box {
      background: #8b5cf6;
      border-color: #8b5cf6;
    }
  </style>
</head>

  <script>
    const COLS = ['dev', 'qa', 'prod'];
    const MAX_LEVEL = 5;

    function getSliderCheckboxes(col) {
      return document.querySelectorAll(`#slider-body input[data-col="${col}"][data-level]`);
    }

    function getSliderLevel(col) {
      const inputs = getSliderCheckboxes(col);
      for (let i = 0; i < inputs.length; i++) {
        if (inputs[i].checked) return i;
      }
      return 5; // Access = none checked
    }

    // level 0 = Full control (all checked), level 5 = Access (only Access checked), -1 = all unchecked (No access)
    function setSliderLevel(col, level) {
      const inputs = getSliderCheckboxes(col);
      inputs.forEach((inp, i) => {
        inp.checked = level >= 0 && i >= level;
      });
    }

    function setNoAccess(col, checked) {
      document.getElementById(`noaccess-${col}`).checked = checked;
      if (checked) {
        setSliderLevel(col, -1);
        document.getElementById(`create-${col}`).checked = false;
        document.getElementById(`deps-${col}`).checked = false;
      }
    }

    function clearNoAccess(col) {
      document.getElementById(`noaccess-${col}`).checked = false;
    }

    // Slider: Full control (0) = all checked; Access (5) = all unchecked; middle = that row and below checked
    document.getElementById('slider-body').addEventListener('change', (e) => {
      const input = e.target;
      if (!input.matches('input[data-level]')) return;
      const col = input.dataset.col;
      const level = parseInt(input.dataset.level, 10);
      clearNoAccess(col);
      if (input.checked) {
        setSliderLevel(col, level); // level 5 (Access) → all unchecked
      } else {
        setSliderLevel(col, Math.min(level + 1, 5)); // uncheck this and above, keep below
      }
    });

    // No access: when checked, uncheck everything else in that column
    document.querySelectorAll('input[data-noaccess]').forEach((input) => {
      input.addEventListener('change', () => {
        const col = input.dataset.col;
        if (input.checked) setNoAccess(col, true);
      });
    });

    // When any other permission is set in a column, uncheck "No access"
    document.querySelectorAll('#slider-body input, input[data-standalone]').forEach((input) => {
      input.addEventListener('change', () => {
        if (input.checked) clearNoAccess(input.dataset.col);
      });
    });

    // Initial state: Dev = Full control (all 6) + Create apps; QA = Open and debug (level 2); Prod = No access
    setSliderLevel('dev', 0);
    document.getElementById('create-dev').checked = true;
    setSliderLevel('qa', 2);
    setNoAccess('prod', true);
  </script>
